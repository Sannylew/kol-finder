services:
  postgres:
    image: postgres:16
    container_name: kol_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 或环境变量中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kol_finder}
      TZ: Asia/Shanghai
    ports:
      # 仅监听本机，避免数据库直接暴露到公网。如需远程连接再调整。
      - "127.0.0.1:5432:5432"
    volumes:
      - kol_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kol} -d ${POSTGRES_DB:-kol_finder}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kol_pgdata:
